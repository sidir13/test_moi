<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D3 Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial, sans-serif; background: #F8FAFC; overflow: hidden; }
#graph-container { position: absolute; inset: 0; }
#graph-container svg { display: block; width: 100%; height: 100%; }
.node { cursor: pointer; stroke: white; stroke-width: 1.5px; }
.link { stroke: #999; stroke-opacity: 0.6; }
.tooltip { position: absolute; background: white; border: 1px solid #ccc; padding: 6px; font-size: 12px; pointer-events: none; opacity: 0; z-index: 10; }
.popup { position: absolute; top: 12px; right: 12px; width: 260px; background: #fff; border: 1px solid #ccc; border-radius: 12px; padding: 14px 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); display: none; font-size: 14px; line-height: 1.4; z-index: 10; }
.popup h3 { margin: 0 0 8px; font-size: 16px; color: #333; }
.popup p { margin: 4px 0; color: #555; }
.popup .close-btn { position: absolute; top: 8px; right: 12px; font-weight: bold; cursor: pointer; font-size: 16px; color: #888; }
.popup .close-btn:hover { color: #333; }
.label { font-size: 11px; pointer-events: none; fill: #111; }
</style>
</head>
<body>
<div id="graph-container"></div>
<div id="tooltip" class="tooltip"></div>
<div id="popup" class="popup"></div>

<script>
const graphData = __GRAPH_DATA__;

const container = document.getElementById("graph-container");
const width = () => container.clientWidth || window.innerWidth;
const height = () => container.clientHeight || window.innerHeight;

const svg = d3.select("#graph-container").append("svg")
  .attr("viewBox", `0 0 ${width()} ${height()}`)
  .attr("preserveAspectRatio", "xMidYMid meet");

const viewport = svg.append("g");

const zoom = d3.zoom()
  .scaleExtent([0.3, 4])
  .on("zoom", (event) => viewport.attr("transform", event.transform));
svg.call(zoom);

const tooltip = d3.select("#tooltip");
const popup = d3.select("#popup");

const nodesById = new Map(graphData.nodes.map(n => [n.id, n]));
const links = graphData.edges
  .map(e => ({ source: nodesById.get(e.source), target: nodesById.get(e.target) }))
  .filter(l => l.source && l.target);

const link = viewport.selectAll(".link")
  .data(links).enter().append("line").attr("class", "link");

const node = viewport.selectAll(".node")
  .data(graphData.nodes).enter().append("circle")
  .attr("class", "node")
  .attr("r", 8)
  .attr("fill", d => {
    if (d.type === "Person") return "#1f77b4";
    if (d.type === "Event") return "#d62728";
    if (d.type === "Place") return "#2ca02c";
    if (d.type === "Keyword") return "#ff7f0e";
    return "gray";
  })
  .on("mouseover", (event, d) => {
    tooltip.style("opacity", 1).html("<b>" + d.name + "</b><br>" + (d.type || ""));
  })
  .on("mousemove", (event) => {
    tooltip.style("left", (event.pageX + 10) + "px").style("top", (event.pageY + 10) + "px");
  })
  .on("mouseout", () => tooltip.style("opacity", 0))
  .on("click", (event, d) => {
    let content = `<span class="close-btn">&times;</span>`;
    content += "<h3>" + d.name + "</h3>";
    if (d.time) content += "<p><b>Time:</b> " + d.time + "</p>";
    if (d.description) content += "<p><b>Description:</b> " + d.description + "</p>";
    content += "<p><b>Type:</b> " + d.type + "</p>";
    popup.style("display", "block").html(content);
    popup.select(".close-btn").on("click", () => popup.style("display", "none"));
  })
  .call(d3.drag()
    .on("start", (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
    .on("end", (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

const labels = viewport.selectAll(".label")
  .data(graphData.nodes).enter().append("text")
  .attr("class", "label").attr("text-anchor", "middle")
  .text(d => d.name);

const simulation = d3.forceSimulation(graphData.nodes)
  .force("link", d3.forceLink(links).distance(70))
  .force("charge", d3.forceManyBody().strength(-180))
  .force("center", d3.forceCenter(width() / 2, height() / 2))
  .force("collide", d3.forceCollide(18));

simulation.on("tick", () => {
  const pad = 12;
  const w = width(), h = height();
  graphData.nodes.forEach(d => {
    d.x = Math.max(pad, Math.min(w - pad, d.x));
    d.y = Math.max(pad, Math.min(h - pad, d.y));
  });
  link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("cx", d => d.x).attr("cy", d => d.y);
  labels.attr("x", d => d.x).attr("y", d => d.y - 12);
});

function resize() {
  svg.attr("viewBox", `0 0 ${width()} ${height()}`);
  simulation.force("center", d3.forceCenter(width() / 2, height() / 2));
  simulation.alpha(0.3).restart();
}
window.addEventListener("resize", resize);
</script>
</body>
</html>
